name: Destroy Infrastructure
on:
  workflow_dispatch:
env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: devops-backend
  ECR_FRONTEND_REPO: devops-frontend
jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
      
      - name: Terraform Destroy
        working-directory: ./terraform
        run: terraform destroy -auto-approve
      
      - name: Delete ECR Repositories
        run: |
          aws ecr delete-repository --repository-name $ECR_BACKEND_REPO --force || true
          aws ecr delete-repository --repository-name $ECR_FRONTEND_REPO --force || true
      
      - name: Cleanup Complete
        run: echo "All AWS resources destroyed!"
